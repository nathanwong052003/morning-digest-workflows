<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Digest — {{DIGEST_DATE}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      color: #111111;
      background-color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .digest-wrapper {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 18px;
    }

    .digest-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }

    .digest-title {
      font-family: "Poppins", "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #000000;
      white-space: nowrap;
    }

    .digest-date {
      font-size: 13px;
      color: #666666;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .header-divider {
      width: 100%;
      border-top: 3px solid #000000;
      margin: 12px 0 18px;
    }

    h1 {
      font-family: "Poppins", "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
      color: #000000;
    }

    h2 {
      font-family: "Poppins", "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-top: 24px;
      margin-bottom: 16px;
      padding-bottom: 6px;
      border-bottom: 0.5px solid #e2e2e2;
      color: #333333;
    }

    .item { margin-bottom: 28px; }

    ul {
      list-style: none;
      margin-bottom: 4px;
    }

    li {
      margin-bottom: 14px;
    }

    .inbox-tag {
      display: inline;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 2px 7px;
      border-radius: 3px;
      margin-right: 6px;
    }

    .inbox-primary {
      font-weight: 700;
      margin-bottom: 2px;
    }

    .inbox-secondary {
      color: #222222;
      margin-left: 0;
    }

    .tag-colored {
      display: inline;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 2px 7px;
      border-radius: 3px;
      margin-right: 6px;
    }

    .headline {
      font-family: "Poppins", "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
      color: #000000;
    }

    .headline-row {
      margin-bottom: 6px;
    }

    .headline-link {
      text-decoration: none;
      color: #000000;
    }

    .headline-link:hover {
      text-decoration: underline;
    }

    .body-text {
      font-size: 14px;
      margin-bottom: 4px;
      color: #222222;
    }

    .warning-banner {
      background: #FEF3C7;
      color: #7C2D12;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .footer-note {
      margin-top: 10px;
      font-size: 12px;
      color: #666666;
      border-top: 1px solid #e2e2e2;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <div class="digest-wrapper">
    <div class="digest-header">
      <div class="digest-title">Morning Digest</div>
      <div class="digest-date">{{DIGEST_DATE}}</div>
    </div>
    {{WARNING_BANNER_HTML}}
    <div class="header-divider"></div>

    <h2>Today's Schedule</h2>
    <ul>
      {{SCHEDULE_ITEMS_HTML}}
    </ul>

    <h2>Priority Inbox</h2>
    <ul>
      {{INBOX_ITEMS_HTML}}
    </ul>

    <h2>Technology</h2>
    {{TECHNOLOGY_ITEMS_HTML}}

    <h2>Southeast Asia &amp; Hong Kong</h2>
    {{SEA_HK_ITEMS_HTML}}

    <div class="footer-note">News updated: {{DIGEST_DATE}}</div>
  </div>
</body>
</html>

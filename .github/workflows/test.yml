name: Morning Digest — Test (Mock Mode)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-mock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    env:
      # --- Core runtime ---
      TIMEZONE_NAME: Asia/Hong_Kong
      OUTPUT_DIR: output
      RUN_ID: test-${{ github.run_id }}

      # --- Mock mode forces no external API calls ---
      MOCK_MODE: "true"

      # --- News (only RSS, no API keys needed) ---
      NEWS_RSS_URLS: https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml
      NEWS_API_URLS_JSON: "[]"
      NEWS_CACHE_PATH: /tmp/morning_digest_news_cache.json
      NEWS_CACHE_TTL_SECONDS: "43200"
      MAX_NEWS_ITEMS: "5"

      # --- PDF rendering ---
      # Use ReportLab on CI to avoid WeasyPrint system deps in test runs.
      # Remove this line to test WeasyPrint (requires apt-get deps below).
      DIGEST_PDF_ENGINE: reportlab

      # --- All other secrets are left empty (mock mode doesn't need them) ---
      CLIENT_ID: ""
      CLIENT_SECRET: ""
      REFRESH_TOKEN: ""
      GMAIL_LABEL_IDS: ""
      GMAIL_KEYWORDS: ""
      GMAIL_MAX_THREADS: "0"
      DRIVE_FOLDER_ID: ""
      DIGEST_CALENDAR_ID: ""
      DEEPSEEK_API_KEY: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # Uncomment below to test WeasyPrint PDF engine instead of ReportLab:
      # - name: Install system dependencies (WeasyPrint)
      #   run: |
      #     sudo apt-get update -qq
      #     sudo apt-get install -y -qq \
      #       libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 \
      #       libffi-dev shared-mime-info libcairo2 libpangoft2-1.0-0 \
      #       libharfbuzz0b libfontconfig1 fonts-liberation fonts-noto-cjk
      #   shell: bash

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest pipeline (mock mode)
        id: digest
        run: python main.py
        continue-on-error: true

      - name: Verify PDF output
        run: |
          echo "Checking for generated PDF files..."
          ls -la output/*.pdf 2>/dev/null && echo "PDF found!" || echo "No PDF generated"
          echo "Checking for generated HTML files..."
          ls -la output/*.html 2>/dev/null && echo "HTML found!" || echo "No HTML generated"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-digest-test-output
          path: output/
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          echo "## Morning Digest — Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mock Mode** | true |" >> $GITHUB_STEP_SUMMARY
          echo "| **PDF Engine** | ${{ env.DIGEST_PDF_ENGINE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest Exit Code** | ${{ steps.digest.outcome }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if pipeline errored
        if: steps.digest.outcome == 'failure'
        run: |
          echo "::error::Digest pipeline failed in mock mode. Check logs above."
          exit 1

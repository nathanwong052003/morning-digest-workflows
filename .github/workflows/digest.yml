name: Morning Digest

on:
  schedule:
    # Run at 21:30 UTC daily = 05:30 HKT (Asia/Hong_Kong)
    - cron: "30 21 * * *"
  workflow_dispatch:
    inputs:
      mock_mode:
        description: "Run without external API calls (Google + DeepSeek)"
        required: false
        type: boolean
        default: false
      debug:
        description: "Enable debug-level logging"
        required: false
        type: boolean
        default: false
      pdf_engine:
        description: "PDF rendering engine (auto, weasyprint, reportlab)"
        required: false
        type: choice
        default: auto
        options:
          - auto
          - weasyprint
          - reportlab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    env:
      # --- Core runtime ---
      TIMEZONE_NAME: Asia/Hong_Kong
      OUTPUT_DIR: output
      RUN_ID: ${{ github.run_id }}

      # --- Google OAuth ---
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}

      # --- Gmail ---
      GMAIL_USER_ID: me
      GMAIL_LABEL_IDS: ${{ secrets.GMAIL_LABEL_IDS }}
      GMAIL_KEYWORDS: ${{ secrets.GMAIL_KEYWORDS }}
      GMAIL_MAX_THREADS: "20"

      # --- News ---
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      NEWS_CACHE_PATH: /tmp/morning_digest_news_cache.json
      NEWS_CACHE_TTL_SECONDS: "43200"

      # --- Distribution ---
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      DIGEST_CALENDAR_ID: ${{ secrets.DIGEST_CALENDAR_ID }}
      DIGEST_EVENT_HOUR: "8"
      DIGEST_EVENT_MINUTE: "0"
      DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}

      # --- Weather (Hong Kong) ---
      WEATHER_LATITUDE: "22.3193"
      WEATHER_LONGITUDE: "114.1694"
      WEATHER_TIMEZONE: Asia/Hong_Kong
      WEATHER_CITY_LABEL: Hong Kong

      # --- News history (for developing-story detection) ---
      NEWS_HISTORY_PATH: /tmp/morning_digest_news_history.json

      # --- Digest iteration counter (increments by 1 each run, persisted in repo) ---
      DIGEST_COUNTER_PATH: .persistent/digest_counter.json

      # --- DeepSeek AI ---
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-chat
      DEEPSEEK_TEMPERATURE: "0.2"
      DEEPSEEK_MAX_TOKENS: "1500"
      AI_RETRY_ATTEMPTS: "3"
      DEEPSEEK_AUDIT_LOG_PATH: output/deepseek_requests_${{ github.run_id }}.jsonl

      # --- Cost controls ---
      TOKEN_SPEND_PATH: /tmp/morning_digest_token_spend.json
      DAILY_TOKEN_WARN_THRESHOLD: "50000"

      # --- Mode ---
      MOCK_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mock_mode || 'false' }}

      # --- PDF rendering ---
      # On Ubuntu, WeasyPrint works with system GTK/Pango libraries installed below.
      # Set to "reportlab" to skip WeasyPrint entirely (no system deps needed).
      DIGEST_PDF_ENGINE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pdf_engine || 'auto' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info \
            libcairo2 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libfontconfig1 \
            fonts-liberation \
            fonts-noto-cjk
        shell: bash

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore news history cache
        id: news_history_cache
        uses: actions/cache@v4
        with:
          path: /tmp/morning_digest_news_history.json
          key: news-history-${{ github.run_id }}
          restore-keys: |
            news-history-

      - name: Run digest pipeline
        id: digest
        run: python main.py
        continue-on-error: true

      - name: Commit digest counter
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .persistent/digest_counter.json; then
            echo "Counter unchanged, skipping commit"
          else
            git add .persistent/digest_counter.json
            git commit -m "Update digest counter [skip ci]" || true
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
            git push || echo "::warning::Counter push failed; next run may show a duplicate counter number."
          fi

      - name: Check audit log
        id: audit_check
        run: |
          AUDIT_FILE="output/deepseek_requests_${{ github.run_id }}.jsonl"
          if [ -f "$AUDIT_FILE" ]; then
            LINE_COUNT=$(wc -l < "$AUDIT_FILE")
            echo "audit_lines=$LINE_COUNT" >> $GITHUB_OUTPUT
            echo "Audit log found with $LINE_COUNT entries"
          else
            echo "audit_lines=0" >> $GITHUB_OUTPUT
            echo "No audit log file found"
          fi

      - name: Upload generated PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-digest-pdf
          path: output/*.pdf
          if-no-files-found: ignore

      - name: Upload DeepSeek audit log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-audit-log
          path: output/deepseek_requests_*.jsonl
          if-no-files-found: ignore

      - name: Upload token spend log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-spend-log
          path: /tmp/morning_digest_token_spend.json
          if-no-files-found: ignore

      - name: Upload news history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-history
          path: /tmp/morning_digest_news_history.json
          if-no-files-found: ignore


      - name: Upload generated HTML artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-digest-html
          path: output/*.html
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          echo "## Morning Digest Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mock Mode** | ${{ env.MOCK_MODE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **PDF Engine** | ${{ env.DIGEST_PDF_ENGINE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest Exit Code** | ${{ steps.digest.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Audit Log Entries** | ${{ steps.audit_check.outputs.audit_lines }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if pipeline errored
        if: steps.digest.outcome == 'failure'
        run: |
          echo "::error::Digest pipeline failed. Check the logs above for details."
          exit 1

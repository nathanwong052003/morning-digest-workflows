name: Morning Digest

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TIMEZONE_NAME: Asia/Hong_Kong
      OUTPUT_DIR: output
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      DIGEST_CALENDAR_ID: ${{ secrets.DIGEST_CALENDAR_ID }}
      GMAIL_LABEL_IDS: ${{ secrets.GMAIL_LABEL_IDS }}
      GMAIL_KEYWORDS: ${{ secrets.GMAIL_KEYWORDS }}
      NEWS_RSS_URLS: ${{ secrets.NEWS_RSS_URLS }}
      NEWS_API_URLS_JSON: ${{ secrets.NEWS_API_URLS_JSON }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: deepseek-chat
      DAILY_TOKEN_WARN_THRESHOLD: "50000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest pipeline
        run: python main.py

      - name: Upload generated PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-digest-pdf
          path: output/*.pdf
          if-no-files-found: ignore
